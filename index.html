<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12간지 사천성 - 어드벤처</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tile-size: 50px;
            --bg-color: #fffdfa;
        }
        body {
            font-family: 'Gaegu', cursive;
            background-color: var(--bg-color);
            overflow-x: hidden;
        }
        @media (max-width: 640px) {
            :root { --tile-size: 38px; }
        }
        .game-board {
            display: grid;
            gap: 5px;
            background-color: #fef3c7;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 0px #f59e0b;
            margin: 0 auto;
            position: relative;
        }
        .tile {
            width: var(--tile-size);
            height: calc(var(--tile-size) * 1.2);
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile-size) * 0.7);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            border-bottom: 5px solid #e2e8f0;
        }
        .tile:hover {
            transform: scale(1.08);
            background-color: #fffbeb;
        }
        .tile.selected {
            background-color: #fde68a;
            border-color: #f59e0b;
            transform: translateY(-5px) scale(1.1);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }
        .tile.hint-highlight {
            animation: hintPulse 0.8s infinite alternate;
            background-color: #bef264;
            border-color: #65a30d;
        }
        @keyframes hintPulse {
            from { transform: scale(1); box-shadow: 0 0 0px #bef264; }
            to { transform: scale(1.1); box-shadow: 0 0 15px #bef264; }
        }
        .tile.empty {
            visibility: hidden;
            pointer-events: none;
        }
        #path-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 20;
        }
        .game-container {
            position: relative;
            display: inline-block;
        }
        .btn-fancy {
            background: white;
            border-bottom: 4px solid #f59e0b;
            color: #d97706;
            transition: all 0.1s;
        }
        .btn-fancy:active {
            border-bottom-width: 0;
            transform: translateY(4px);
        }
        .btn-fancy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-bottom-width: 2px;
            transform: translateY(2px);
        }
        .shuffle-btn-container {
            transition: all 0.3s ease;
            transform: scale(0);
            opacity: 0;
            height: 0;
            overflow: hidden;
        }
        .shuffle-btn-container.show {
            transform: scale(1);
            opacity: 1;
            height: auto;
            margin-top: 1.5rem;
        }
        .modal {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header Section -->
    <div class="text-center mb-4">
        <h1 class="text-5xl font-bold mb-1 text-amber-600">🐉 12간지 대모험 🐉</h1>
        <div id="level-display" class="text-2xl font-bold text-amber-500">LEVEL 1</div>
    </div>

    <!-- Status Bar -->
    <div class="flex gap-3 mb-4">
        <div class="bg-white p-2 px-3 rounded-2xl text-center shadow-sm border-2 border-amber-200">
            <div class="text-[10px] text-amber-400 font-bold uppercase">남은 친구들</div>
            <div id="remaining-count" class="text-xl font-bold text-amber-600">0</div>
        </div>
        <div class="bg-white p-2 px-3 rounded-2xl text-center shadow-sm border-2 border-amber-200">
            <div class="text-[10px] text-amber-400 font-bold uppercase">게임 시간</div>
            <div id="timer" class="text-xl font-bold text-amber-600">00:00</div>
        </div>
        <div class="bg-white p-2 px-3 rounded-2xl text-center shadow-sm border-2 border-amber-200">
            <div class="text-[10px] text-amber-400 font-bold uppercase">남은 힌트</div>
            <div id="hint-count" class="text-xl font-bold text-green-600">3</div>
        </div>
    </div>

    <!-- Board Area -->
    <div class="game-container" id="container">
        <canvas id="path-canvas"></canvas>
        <div id="board" class="game-board"></div>
    </div>

    <!-- Main Controls -->
    <div class="mt-6 flex gap-3">
        <button onclick="resetWholeGame()" class="btn-fancy px-5 py-2 rounded-xl font-bold text-lg">처음부터</button>
        <button id="hint-btn" onclick="useHint()" class="btn-fancy px-5 py-2 rounded-xl font-bold text-lg text-green-700 border-green-500">힌트 쓰기</button>
    </div>

    <!-- Conditional Shuffle Button -->
    <div id="shuffle-container" class="shuffle-btn-container">
        <button id="shuffle-btn" onclick="shuffleBoard()" class="btn-fancy px-10 py-3 rounded-2xl font-bold text-2xl bg-amber-100 border-amber-600 text-amber-800 animate-bounce">
            길이 막혔어요! 친구들 섞기 ✨
        </button>
    </div>

    <!-- Toast Message -->
    <div id="message-box" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white/95 text-amber-600 border-2 border-amber-300 font-bold text-xl px-6 py-3 rounded-2xl shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center">
    </div>

    <!-- Modal (Level Up / Ranking) -->
    <div id="modal" class="fixed inset-0 modal flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center border-4 border-amber-300">
            <h2 id="modal-title" class="text-4xl font-bold text-amber-600 mb-4">축하합니다!</h2>
            <div id="modal-content" class="text-xl mb-6"></div>
            <div id="ranking-list" class="text-left mb-6 bg-amber-50 p-4 rounded-xl hidden">
                <h3 class="font-bold text-amber-700 border-bottom border-amber-200 mb-2">🏆 명예의 전당</h3>
                <div id="rank-items"></div>
            </div>
            <button onclick="closeModal()" class="btn-fancy w-full py-3 rounded-2xl font-bold text-2xl">계속하기</button>
        </div>
    </div>

    <script>
        const MAX_LEVEL = 5;
        const ROWS = 9;
        const COLS = 13;
        const SYMBOLS = ['🐭', '🐮', '🐯', '🐰', '🐲', '🐍', '🐴', '🐑', '🐵', '🐔', '🐶', '🐷'];
        
        let currentLevel = 1;
        let board = [];
        let selectedTile = null;
        let startTime = null;
        let timerInterval = null;
        let totalGameStartTime = null;
        let hintsLeft = 3;

        const SHAPES = {
            1: (r, c) => (r >= 3 && r <= 7 && c >= 4 && c <= 10),
            2: (r, c) => Math.abs(r-5) + Math.abs(c-7) <= 4,
            3: (r, c) => {
                const dr = r - 5; const dc = c - 7;
                return (Math.abs(dr) <= 3 && Math.abs(dc) <= 5) && (Math.abs(dr) >= Math.abs(dc) - 1 || Math.abs(dc) <= 1);
            },
            4: (r, c) => {
                const dr = r - 5; const dc = c - 7;
                return (Math.abs(dr) <= 1 || Math.abs(dc) <= 1 || (Math.abs(dr) == 2 && Math.abs(dc) == 2));
            },
            5: (r, c) => {
                const dr = r - 5; const dc = c - 7;
                return (dr*dr + dc*dc <= 16);
            }
        };

        function initGame(level = 1) {
            currentLevel = level;
            if (level === 1) {
                totalGameStartTime = Date.now();
                clearInterval(timerInterval);
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                hintsLeft = 3;
            }
            
            updateHintUI();
            document.getElementById('level-display').textContent = `LEVEL ${currentLevel}`;
            document.getElementById('shuffle-container').classList.remove('show');

            let positions = [];
            for(let r = 1; r <= ROWS; r++) {
                for(let c = 1; c <= COLS; c++) {
                    if (SHAPES[currentLevel](r, c)) positions.push({r, c});
                }
            }

            if (positions.length % 2 !== 0) positions.pop();
            
            let tiles = [];
            for(let i = 0; i < positions.length / 2; i++) {
                const symbol = SYMBOLS[i % SYMBOLS.length];
                tiles.push(symbol, symbol);
            }
            tiles.sort(() => Math.random() - 0.5);

            board = Array.from({length: ROWS + 2}, () => Array(COLS + 2).fill(null));
            positions.forEach(pos => {
                board[pos.r][pos.c] = tiles.pop();
            });
            
            renderBoard();
            updateStats();
            setTimeout(() => {
                resizeCanvas();
                checkDeadlock();
            }, 100);
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            boardElement.innerHTML = '';

            for(let r = 1; r <= ROWS; r++) {
                for(let c = 1; c <= COLS; c++) {
                    const tileDiv = document.createElement('div');
                    tileDiv.className = `tile ${board[r][c] ? '' : 'empty'}`;
                    tileDiv.textContent = board[r][c] || '';
                    tileDiv.dataset.r = r;
                    tileDiv.dataset.c = c;
                    tileDiv.onclick = () => handleTileClick(r, c);
                    boardElement.appendChild(tileDiv);
                }
            }
        }

        function handleTileClick(r, c) {
            if (!board[r][c]) return;
            
            // Clear any hint highlights
            document.querySelectorAll('.hint-highlight').forEach(t => t.classList.remove('hint-highlight'));

            const currentTile = { r, c, symbol: board[r][c] };
            
            if (!selectedTile) {
                selectedTile = currentTile;
                document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.add('selected');
            } else {
                if (selectedTile.r === r && selectedTile.c === c) {
                    selectedTile = null;
                    document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
                    return;
                }

                if (selectedTile.symbol === currentTile.symbol) {
                    const path = findPath(selectedTile, currentTile);
                    if (path) {
                        drawPath(path);
                        setTimeout(() => {
                            board[selectedTile.r][selectedTile.c] = null;
                            board[r][c] = null;
                            selectedTile = null;
                            renderBoard();
                            clearCanvas();
                            updateStats();
                            if(!checkLevelClear()) checkDeadlock();
                        }, 250);
                    } else {
                        showMessage("길이 막혔어요! 🚧");
                        resetSelection(r, c);
                    }
                } else {
                    resetSelection(r, c);
                }
            }
        }

        function resetSelection(r, c) {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            selectedTile = { r, c, symbol: board[r][c] };
            document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.add('selected');
        }

        function findPath(start, end) {
            const dr = [-1, 1, 0, 0];
            const dc = [0, 0, -1, 1];
            let queue = [{r: start.r, c: start.c, dir: -1, turns: 0, path: [{r: start.r, c: start.c}]}];
            let visited = new Map();

            while(queue.length > 0) {
                let current = queue.shift();
                if(current.turns > 2) continue;
                if(current.r === end.r && current.c === end.c) return current.path;

                for(let i = 0; i < 4; i++) {
                    let nr = current.r + dr[i];
                    let nc = current.c + dc[i];
                    if(nr < 0 || nr >= ROWS + 2 || nc < 0 || nc >= COLS + 2) continue;

                    if(board[nr][nc] === null || (nr === end.r && nc === end.c)) {
                        let nTurns = current.turns;
                        if(current.dir !== -1 && current.dir !== i) nTurns++;
                        if(nTurns <= 2) {
                            let posKey = `${nr},${nc},${i}`;
                            if(!visited.has(posKey) || visited.get(posKey) > nTurns) {
                                visited.set(posKey, nTurns);
                                queue.push({ r: nr, c: nc, dir: i, turns: nTurns, path: [...current.path, {r: nr, c: nc}] });
                            }
                        }
                    }
                }
            }
            return null;
        }

        function checkDeadlock() {
            const pair = findAvailablePair();
            if(!pair) {
                showMessage("더 이상 연결할 곳이 없어요!<br>친구들을 섞어주세요!");
                document.getElementById('shuffle-container').classList.add('show');
                return true;
            } else {
                document.getElementById('shuffle-container').classList.remove('show');
                return false;
            }
        }

        function findAvailablePair() {
            let activeTiles = [];
            for(let r = 1; r <= ROWS; r++) {
                for(let c = 1; c <= COLS; c++) {
                    if(board[r][c]) activeTiles.push({r, c, symbol: board[r][c]});
                }
            }
            if(activeTiles.length === 0) return null;

            for(let i = 0; i < activeTiles.length; i++) {
                for(let j = i + 1; j < activeTiles.length; j++) {
                    if(activeTiles[i].symbol === activeTiles[j].symbol) {
                        if(findPath(activeTiles[i], activeTiles[j])) {
                            return [activeTiles[i], activeTiles[j]];
                        }
                    }
                }
            }
            return null;
        }

        function useHint() {
            if(hintsLeft <= 0) {
                showMessage("힌트를 모두 사용하셨어요! 😢");
                return;
            }

            const pair = findAvailablePair();
            if(pair) {
                hintsLeft--;
                updateHintUI();
                pair.forEach(pos => {
                    document.querySelector(`[data-r="${pos.r}"][data-c="${pos.c}"]`).classList.add('hint-highlight');
                });
                showMessage("여기에요! 친구들을 확인하세요! ✨");
            } else {
                showMessage("힌트를 줄 수 있는 친구가 없어요!");
            }
        }

        function updateHintUI() {
            const display = document.getElementById('hint-count');
            display.textContent = hintsLeft;
            const btn = document.getElementById('hint-btn');
            if(hintsLeft <= 0) btn.disabled = true;
            else btn.disabled = false;
        }

        function drawPath(path) {
            const canvas = document.getElementById('path-canvas');
            const ctx = canvas.getContext('2d');
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            const getCoord = (r, c) => ({ x: (c - 0.5) * (rect.width / COLS), y: (r - 0.5) * (rect.height / ROWS) });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#f59e0b';
            ctx.setLineDash([8, 4]);
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';

            const start = getCoord(path[0].r, path[0].c);
            ctx.moveTo(start.x, start.y);
            for(let i = 1; i < path.length; i++) {
                const p = getCoord(path[i].r, path[i].c);
                ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
        }

        function clearCanvas() {
            const canvas = document.getElementById('path-canvas');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function resizeCanvas() {
            const canvas = document.getElementById('path-canvas');
            const boardEl = document.getElementById('board');
            if (boardEl) { canvas.width = boardEl.offsetWidth; canvas.height = boardEl.offsetHeight; }
        }

        function updateStats() {
            let count = 0;
            board.forEach(row => row.forEach(cell => { if(cell) count++; }));
            document.getElementById('remaining-count').textContent = count;
        }

        function updateTimer() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }

        function showMessage(msg) {
            const box = document.getElementById('message-box');
            box.innerHTML = msg; box.style.opacity = "1";
            setTimeout(() => { box.style.opacity = "0"; }, 3000);
        }

        function shuffleBoard() {
            let tiles = [];
            for(let r = 1; r <= ROWS; r++) {
                for(let c = 1; c <= COLS; c++) { if(board[r][c]) tiles.push(board[r][c]); }
            }
            if(tiles.length === 0) return;
            tiles.sort(() => Math.random() - 0.5);
            for(let r = 1; r <= ROWS; r++) {
                for(let c = 1; c <= COLS; c++) { if(board[r][c]) board[r][c] = tiles.pop(); }
            }
            renderBoard();
            document.getElementById('shuffle-container').classList.remove('show');
            showMessage("친구들을 새롭게 섞었어요! 🌀");
            setTimeout(checkDeadlock, 200);
        }

        function checkLevelClear() {
            let count = 0;
            board.forEach(row => row.forEach(cell => { if(cell) count++; }));
            if(count === 0) {
                if(currentLevel < MAX_LEVEL) {
                    showLevelModal();
                } else {
                    showFinalModal();
                }
                return true;
            }
            return false;
        }

        function showLevelModal() {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.textContent = `LEVEL ${currentLevel} 클리어!`;
            content.textContent = "다음 단계로 넘어갈 준비가 되셨나요?";
            document.getElementById('ranking-list').classList.add('hidden');
            modal.classList.remove('hidden');
        }

        function showFinalModal() {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            clearInterval(timerInterval);
            
            const totalTimeSec = Math.floor((Date.now() - totalGameStartTime) / 1000);
            const m = Math.floor(totalTimeSec / 60);
            const s = totalTimeSec % 60;
            const timeStr = `${m}분 ${s}초`;

            saveRanking(totalTimeSec);

            title.textContent = "최종 클리어! 🎉";
            content.innerHTML = `모든 단계를 정복하셨습니다!<br>총 게임 시간: <span class="text-amber-600 font-bold">${timeStr}</span>`;
            
            displayRanking();
            document.getElementById('ranking-list').classList.remove('hidden');
            modal.classList.remove('hidden');
        }

        function saveRanking(score) {
            let rankings = JSON.parse(localStorage.getItem('shisensho_rankings') || '[]');
            rankings.push({score, date: new Date().toLocaleDateString()});
            rankings.sort((a, b) => a.score - b.score);
            localStorage.setItem('shisensho_rankings', JSON.stringify(rankings.slice(0, 5)));
        }

        function displayRanking() {
            const list = document.getElementById('rank-items');
            let rankings = JSON.parse(localStorage.getItem('shisensho_rankings') || '[]');
            list.innerHTML = rankings.map((r, i) => {
                const m = Math.floor(r.score / 60);
                const s = r.score % 60;
                return `<div class="flex justify-between border-b border-amber-100 py-1">
                    <span>${i+1}위. ${m}분 ${s}초</span>
                    <span class="text-sm text-gray-400">${r.date}</span>
                </div>`;
            }).join('') || "아직 기록이 없어요!";
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            if (currentLevel < MAX_LEVEL) {
                initGame(currentLevel + 1);
            } else {
                resetWholeGame();
            }
        }

        function resetWholeGame() {
            initGame(1);
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = () => initGame(1);
    </script>
</body>
</html>
